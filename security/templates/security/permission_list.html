{% extends 'billing/base.html' %}
{% block title %}Permisos{% endblock %}
{% block content %}
<h2>Permisos</h2>
<a href="{% url 'security:permission_create' %}" class="btn btn-primary btn-sm mb-3">+ Nuevo Permiso</a>

<table class="table table-striped table-hover table-sm">
  <thead class="table-dark">
    <tr><th>Nombre</th><th>Código</th><th>Modelo</th><th>Acciones</th></tr>
  </thead>
  <tbody>
    {% for p in items %}
    <tr>
      <td>{{ p.name }}</td>
      <td><code>{{ p.codename }}</code></td>
      <td>{{ p.content_type.model }}</td>
      <td>
        <a href="{% url 'security:permission_update' p.pk %}" class="btn btn-sm btn-warning">Editar</a>
        <a href="{% url 'security:permission_delete' p.pk %}" class="btn btn-sm btn-danger">Eliminar</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="4" class="text-center">No hay permisos.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
